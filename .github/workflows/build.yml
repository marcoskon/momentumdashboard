name: Procesar archivos y publicar dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice-calc --no-install-recommends --fix-missing

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Parsear xlsx y generar JSON
        run: |
          if ls raw/*.xlsx 1> /dev/null 2>&1; then
            python scripts/parse_data.py
          else
            echo "No hay archivos xlsx en raw/ todavía"
          fi

      - name: Commitear los JSON generados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: actualizar datos [$(date '+%Y-%m-%d %H:%M')]"
          git push
